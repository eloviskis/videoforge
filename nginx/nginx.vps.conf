worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    sendfile on;
    client_max_body_size 500M;

    # ── Gzip otimizado ──
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml application/xml+rss;
    gzip_min_length 1000;

    # www → non-www redirect
    server {
        listen 80;
        listen 443 ssl;
        server_name www.videoforge.tech;
        ssl_certificate /etc/letsencrypt/live/videoforge.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/videoforge.tech/privkey.pem;
        return 301 https://videoforge.tech$request_uri;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name videoforge.tech;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://videoforge.tech$request_uri;
        }
    }

    # Fallback HTTP (IP direto, sem domínio)
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        location /media/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name videoforge.tech;

        ssl_certificate /etc/letsencrypt/live/videoforge.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/videoforge.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Headers de segurança (SEO + segurança) ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Cache de assets estáticos ──
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Frontend (React)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Media
        location /media/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        # Downloads (EXE installer + auto-update)
        location /downloads/ {
            alias /downloads/;
            autoindex off;
            add_header Cache-Control 'public, max-age=86400';
            add_header Access-Control-Allow-Origin '*';
            types {
                application/octet-stream exe;
                application/octet-stream AppImage;
                application/octet-stream dmg;
            }
        }

        # n8n
        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
    }
}
