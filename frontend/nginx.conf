server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect curto para link de afiliação Hotmart
    location = /afiliar {
        return 302 https://app.hotmart.com/market/details?producerCode=5C0339D1-9E72-405B-88F6-5DA8286533FC&productCode=29D0E720-8F02-4F48-A6E7-E7CB1D0F5825;
    }

    # Páginas estáticas sem extensão
    location = /afiliados {
        try_files /afiliados.html =404;
    }

    # SPA - redireciona todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
