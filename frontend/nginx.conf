server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect curto para link de afiliação Hotmart
    location = /afiliar {
        return 302 https://affiliate.hotmart.com/affiliate-recruiting/view/8389V104720980;
    }

    # Páginas estáticas sem extensão
    location = /afiliados {
        try_files /afiliados.html =404;
    }

    # SPA - redireciona todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
