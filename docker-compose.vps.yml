# docker-compose.vps.yml — Deploy direto via IP, sem SSL
# Uso: docker compose -f docker-compose.vps.yml up -d --build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videoforge-frontend
    restart: always
    networks:
      - videoforge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videoforge-backend
    restart: always
    env_file:
      - ./backend/.env.production
    volumes:
      - ./media:/media
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - videoforge-network

  nginx:
    image: nginx:alpine
    container_name: videoforge-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.vps.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - videoforge-network

  python-worker:
    build:
      context: ./python-worker
      dockerfile: Dockerfile
    container_name: videoforge-python-worker
    restart: always
    volumes:
      - ./media:/media
    environment:
      - PYTHONUNBUFFERED=1
    command: tail -f /dev/null
    networks:
      - videoforge-network

  postgres:
    image: postgres:15-alpine
    container_name: videoforge-postgres
    restart: always
    environment:
      - POSTGRES_USER=videoforge
      - POSTGRES_PASSWORD=${DB_PASSWORD:-forge123}
      - POSTGRES_DB=videoforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videoforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - videoforge-network

  n8n:
    image: n8nio/n8n:latest
    container_name: videoforge-n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=videoforge2026
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${DB_N8N_PASSWORD:-n8n123}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./media:/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - videoforge-network

volumes:
  postgres_data:
  n8n_data:

networks:
  videoforge-network:
    driver: bridge
